name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint (incl. bandit/S)
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (strict)
        run: mypy src

      - name: Pytest + coverage gate
        run: pytest --cov=aioips --cov-branch --cov-report=xml --cov-fail-under=80
